  .pw-logo { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .pw-logo span { color: #6c63ff; }
  .pw-sub { color: #8892a4; font-size: 14px; margin-bottom: 32px; }
  .pw-input { width: 100%; padding: 14px 16px; background: #0f1117; border: 1px solid #2d3056; border-radius: 10px; color: #fff; font-size: 16px; text-align: center; letter-spacing: 2px; margin-bottom: 12px; outline: none; }
  .pw-input:focus { border-color: #6c63ff; }
  .pw-btn { width: 100%; padding: 14px; background: #6c63ff; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .pw-btn:hover { background: #5a52e0; }
  .pw-err { color: #f87171; font-size: 13px; margin-top: 8px; display: none; }

  /* Header */
  .header { background: #1a1d2e; border-bottom: 1px solid #2d3056; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 22px; font-weight: 800; color: #fff; }
  .logo span { color: #6c63ff; }
  .sync-btn { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
  .sync-btn:hover { background: #5a52e0; }
  .sync-btn:disabled { background: #3d3d5c; cursor: not-allowed; }
  .last-sync { font-size: 12px; color: #64748b; }

  /* Tabs */
  .tabs { display: flex; gap: 0; background: #1a1d2e; border-bottom: 1px solid #2d3056; padding: 0 32px; }
  .tab { padding: 14px 28px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: #8892a4; transition: all 0.2s; }
  .tab.active { color: #6c63ff; border-bottom-color: #6c63ff; }

  /* Main */
  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .month-panel { display: none; }
  .month-panel.active { display: block; }

  /* Store tabs */
  .store-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
  .store-tab { padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: #1a1d2e; color: #8892a4; border: 1px solid #2d3056; transition: all 0.2s; }
  .store-tab.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }

  /* KPI Grid */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi { background: #1a1d2e; border: 1px solid #2d3056; border-radius: 12px; padding: 20px; }
  .kpi-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 800; color: #fff; }
  .kpi-sub { font-size: 13px; color: #8892a4; margin-top: 4px; }
  .kpi.green .kpi-value { color: #34d399; }
  .kpi.yellow .kpi-value { color: #fbbf24; }
  .kpi.red .kpi-value { color: #f87171; }
  .kpi.purple .kpi-value { color: #a78bfa; }

  /* Section */
  .section { background: #1a1d2e; border: 1px solid #2d3056; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .section-title { font-size: 15px; font-weight: 700; color: #a0aec0; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: right; border-bottom: 1px solid #2d3056; }
  td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #1e2235; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108, 99, 255, 0.04); }

  /* Bar */
  .bar-wrap { display: flex; align-items: center; gap: 10px; }
  .bar-bg { flex: 1; height: 6px; background: #2d3056; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: #6c63ff; transition: width 0.4s; }
  .bar-fill.green { background: #34d399; }
  .bar-fill.yellow { background: #fbbf24; }
  .bar-fill.red { background: #f87171; }

  /* Badge */
  .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge.green { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge.yellow { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .badge.red { background: rgba(248,113,113,0.15); color: #f87171; }

  /* Total row */
  .total-row { background: rgba(108,99,255,0.08); }
  .total-row td { font-weight: 700; color: #fff; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* Loading overlay */
  #loading { position: fixed; inset: 0; background: rgba(10,10,20,0.85); z-index: 900; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #loading.show { display: flex; }
  .load-spinner { width: 40px; height: 40px; border: 3px solid rgba(108,99,255,0.3); border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .load-text { color: #8892a4; font-size: 14px; }

  /* Daily chart */
  .chart-container { overflow-x: auto; }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 100px; padding-bottom: 4px; }
  .chart-day { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 22px; }
  .chart-bar { width: 100%; background: #6c63ff; border-radius: 3px 3px 0 0; transition: height 0.4s; }
  .chart-label { font-size: 9px; color: #64748b; }
</style>

function checkCode() {
  const v = document.getElementById('pw-input').value.trim().toUpperCase();
  if (CODES.includes(v)) {
    document.getElementById('paywall').style.display = 'none';
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('main-tabs').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    loadDashboard();
  } else {
    const err = document.getElementById('pw-err');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') checkCode(); });

function fmt(n) { return '₪' + Math.round(n).toLocaleString('he-IL'); }
function pct(n) { return n.toFixed(1) + '%'; }
function pctClass(p, low, high) { return p < low ? 'green' : p < high ? 'yellow' : 'red'; }
function kpiClass(p, low, high) { return p < low ? 'green' : p < high ? 'yellow' : 'red'; }

function buildContent(month, storeKey, d) {
  const stores = d.months[month].stores;
  const hanmal = stores.find(s => s.store === 'הנמל');
  const hatib  = stores.find(s => s.store === 'חטיב');
  const comb   = d.months[month].combined;
  const label  = month === 'may' ? 'מאי 2026' : 'יוני 2026 MTD';

  let s, vendors, workers, dailySales;
  if (storeKey === 'combined') {
    s = { sales_gross: comb.sales_gross, sales_net: comb.sales_net,
          labor_cost: comb.labor_cost, labor_pct: comb.labor_pct,
          food_cost_net: comb.food_cost_net, food_cost_pct: comb.food_pct,
          wolt_sales: comb.wolt_sales, wolt_pct: Math.round(comb.wolt_sales/(comb.sales_gross||1)*1000)/10,
          total_pct: comb.total_pct, covers: comb.covers };
    vendors = d.months[month].food_vendors;
    workers = [...(hanmal.workers||[]), ...(hatib.workers||[])].sort((a,b)=>b.cost-a.cost).slice(0,15);
    dailySales = null;
  } else {
    s = storeKey === 'hanmal' ? hanmal : hatib;
    vendors = s.vendors || [];
    workers = s.workers || [];
    dailySales = s.daily_sales || [];
  }

  const storeName = storeKey === 'combined' ? 'שני הסניפים' : s.store;
  const woltComm = Math.round((s.wolt_sales||0) * 0.24);
  const woltCommPct = s.sales_net > 0 ? (woltComm/s.sales_net*100).toFixed(1) : '0.0';
  const lc = kpiClass(s.labor_pct, 25, 32);
  const fc = kpiClass(s.food_cost_pct, 25, 35);
  const tc = kpiClass(s.total_pct, 50, 60);

  // Daily chart
  let chartHtml = '';
  if (dailySales && dailySales.length > 0) {
    const maxSale = Math.max(...dailySales.map(d=>d.sales));
    chartHtml = `
    <div class="section">
      <div class="section-title">📈 מכירות יומיות — ${storeName}</div>
      <div class="chart-container">
        <div class="chart-bars">
          ${dailySales.map(d => {
            const h = Math.round((d.sales/maxSale)*90);
            const day = d.date.split('-')[2];
            return `<div class="chart-day">
              <div class="chart-bar" style="height:${h}px" title="${fmt(d.sales)}"></div>
              <div class="chart-label">${parseInt(day)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // Vendors table
  const maxVendor = vendors.length > 0 ? Math.max(...vendors.map(v=>v.amount||0)) : 1;
  const vendorRows = vendors.slice(0,10).map(v => {
    const pctOfFood = s.food_cost_net > 0 ? (v.amount/s.food_cost_net*100).toFixed(1) : '0';
    const barPct = maxVendor > 0 ? Math.round(v.amount/maxVendor*100) : 0;
    return `<tr>
      <td>${v.name}</td>
      <td>${fmt(v.amount)}</td>
      <td>${pctOfFood}%</td>
      <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${barPct}%"></div></div></div></td>
    </tr>`;
  }).join('');

  // Workers table
  const workerRows = workers.slice(0,12).map(w => `<tr>
    <td>${w.name}</td>
    <td>${w.role||''}</td>
    <td>${w.hours}h</td>
    <td>${fmt(w.cost)}</td>
  </tr>`).join('');

  return `
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">💰 מכירות ברוטו</div>
      <div class="kpi-value">${fmt(s.sales_gross)}</div>
      <div class="kpi-sub">נטו ${fmt(s.sales_net)}</div>
    </div>
    <div class="kpi ${lc}">
      <div class="kpi-label">👷 עלות עבודה</div>
      <div class="kpi-value">${fmt(s.labor_cost)}</div>
      <div class="kpi-sub">${pct(s.labor_pct)} מהמכירות נטו</div>
    </div>
    <div class="kpi ${fc}">
      <div class="kpi-label">🍔 עלות מזון (MarketMan)</div>
      <div class="kpi-value">${fmt(s.food_cost_net)}</div>
      <div class="kpi-sub">${pct(s.food_cost_pct)} מהמכירות נטו</div>
    </div>
    <div class="kpi purple">
      <div class="kpi-label">🛵 וולט</div>
      <div class="kpi-value">${fmt(s.wolt_sales)}</div>
      <div class="kpi-sub">עמלה ${fmt(woltComm)} (${woltCommPct}%)</div>
    </div>
    <div class="kpi ${tc}">
      <div class="kpi-label">📊 סה"כ עלויות</div>
      <div class="kpi-value">${pct(s.total_pct)}</div>
      <div class="kpi-sub">עבודה + מזון</div>
    </div>
  </div>

  ${chartHtml}

  <div class="section">
    <div class="section-title">🧾 ספקים — עלות מזון ${label}</div>
    <table>
      <thead><tr><th>ספק</th><th>סכום</th><th>% ממזון</th><th>יחסי</th></tr></thead>
      <tbody>${vendorRows}</tbody>
      <tbody><tr class="total-row"><td>סה"כ</td><td>${fmt(s.food_cost_net)}</td><td>100%</td><td></td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">👷 עובדים — עלות שכר ${label}</div>
    <table>
      <thead><tr><th>שם</th><th>תפקיד</th><th>שעות</th><th>עלות</th></tr></thead>
      <tbody>${workerRows}</tbody>
      <tbody><tr class="total-row"><td>סה"כ</td><td></td><td></td><td>${fmt(s.labor_cost)}</td></tr></tbody>
    </table>
  </div>`;
}

function switchTab(month) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (month==='jun'?0:1)));
  document.querySelectorAll('.month-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${month}`).classList.add('active');
}

function switchStore(month, storeKey) {
  currentStore[month] = storeKey;
  document.querySelectorAll(`#panel-${month} .store-tab`).forEach((t,i) => {
    t.classList.toggle('active', ['combined','hanmal','hatib'][i] === storeKey);
  });
  if (DATA) {
    document.getElementById(`${month}-content`).innerHTML = buildContent(month, storeKey, DATA);
  }
}

async function loadDashboard() {
  document.getElementById('loading').classList.add('show');
  try {
    const res = await fetch(SYNC_URL, { method: 'POST' });
    const raw = await res.json();

    // Transform old format (single month) to new multi-month format
    // The new breadaSync returns {months:{may:{...}, jun:{...}}}
    // For now handle both formats
    let data;
    if (raw.months) {
      data = raw;
    } else {
      // Old format — only has current month, build structure
      // We need to call twice or use embedded data
      // Use embedded May data we already fetched
      data = buildFallbackData(raw);
    }

    DATA = data;
    renderAll();
    document.getElementById('last-sync').textContent = 'עדכון אחרון: ' + new Date(raw.last_updated || Date.now()).toLocaleString('he-IL');
  } catch(e) {
    document.getElementById('last-sync').textContent = 'שגיאה בטעינה — ' + e.message;
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}
